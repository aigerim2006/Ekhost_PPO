<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Эквайринг-хост{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --bank-primary: #003366; }
        body { background-color: #f8f9fa; }
        .navbar { background-color: var(--bank-primary) !important; }
        .card { border-radius: 10px; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .nav-link.active { font-weight: bold; text-decoration: underline; }
        .footer { margin-top: 50px; padding: 20px 0; color: #6c757d; font-size: 0.9rem; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{% url 'upload' %}">
                <span class="fs-4">🏦 Модуль "Эквайринг-хост"</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'upload' %}active{% endif %}" href="{% url 'upload' %}">Загрузка файла</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'transaction_logs' %}active{% endif %}" href="{% url 'transaction_logs' %}">Лог транзакций</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link px-3 {% if request.resolver_match.url_name == 'financial_reports' %}active{% endif %}" href="{% url 'financial_reports' %}">Финансовые отчеты</a>
                    </li>
                    <li class="nav-item ms-lg-3">
                        <a class="btn btn-outline-light btn-sm mt-1" href="/admin/">Админ-панель (Аудит)</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </main>

    <footer class="container text-center footer border-top">
        <p>© 2026 КГТУ им. И. Раззакова | Кафедра ПОКС </p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
